name: Deploy Prd

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 5"

permissions: {}

concurrency:
  group: ${{ github.workflow }}

jobs:
  detect-changes:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.changes.outputs.src }}
      terraform: ${{ steps.changes.outputs.terraform }}
    steps:
      - id: changes
        uses: frasermolyneux/actions/detect-changes@detect-changes/v1.0
        with:
          filters: |
            src:src/**
            terraform:terraform/**

  terraform-state-check-dev:
    if: github.event_name != 'schedule'
    permissions:
      contents: read
      id-token: write
    environment: Development
    runs-on: ubuntu-latest
    outputs:
      has_resources: ${{ steps.state-check.outputs.has_resources }}
    steps:
      - id: state-check
        uses: frasermolyneux/actions/terraform-state-check@terraform-state-check/v1.1
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/dev.tfvars"
          terraform-backend-file: "backends/dev.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  build-and-test:
    permissions:
      contents: read
      id-token: write
    needs:
      - detect-changes
      - terraform-state-check-dev
    if: |
      github.event_name != 'schedule' &&
      !failure() && !cancelled() &&
      (
        needs.detect-changes.outputs.src == 'true' ||
        needs.terraform-state-check-dev.outputs.has_resources != 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: frasermolyneux/actions/dotnet-func-ci@dotnet-func-ci/v2.0
        with:
          dotnet-project: "MX.Platform.Status.App"
          dotnet-version: "9.0.x"
          src-folder: "src"

      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"

      - name: Install frontend dependencies
        run: npm install
        working-directory: src/MX.Platform.Status.Web

      - name: Build frontend
        run: npm run build
        working-directory: src/MX.Platform.Status.Web

      - name: Remove node_modules before packaging
        run: rm -rf node_modules
        working-directory: src/MX.Platform.Status.Web

      - uses: actions/upload-artifact@v7
        with:
          name: static-site
          path: src/MX.Platform.Status.Web/dist

  terraform-plan-and-apply-dev:
    if: github.event_name != 'schedule'
    permissions:
      contents: read
      id-token: write
    environment: Development
    needs:
      - detect-changes
      - terraform-state-check-dev
      - build-and-test
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-dev
    outputs:
      func_apps: ${{ steps.terraform-output.outputs.func_apps }}
      static_web_app: ${{ steps.terraform-output.outputs.static_web_app }}
      static_web_app_name: ${{ steps.terraform-output.outputs.static_web_app_name }}
    steps:
      - if: needs.detect-changes.outputs.terraform == 'true' || needs.terraform-state-check-dev.outputs.has_resources != 'true'
        uses: frasermolyneux/actions/terraform-plan-and-apply@terraform-plan-and-apply/v1.4
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/dev.tfvars"
          terraform-backend-file: "backends/dev.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - if: needs.detect-changes.outputs.terraform != 'true' && needs.terraform-state-check-dev.outputs.has_resources == 'true'
        uses: frasermolyneux/actions/terraform-output@terraform-output/v1.0
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/dev.tfvars"
          terraform-backend-file: "backends/dev.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - id: terraform-output
        shell: bash
        run: |
          cd terraform
          echo "func_apps=$(terraform output -json func_apps)" >> "$GITHUB_OUTPUT"
          echo "static_web_app=$(terraform output -json static_web_app)" >> "$GITHUB_OUTPUT"
          echo "static_web_app_name=$(terraform output -raw static_web_app_name)" >> "$GITHUB_OUTPUT"
        env:
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_USE_AZUREAD: true
          ARM_USE_OIDC: true

  function-app-deploy-dev:
    permissions:
      contents: read
      id-token: write
    environment: Development
    needs:
      - detect-changes
      - terraform-state-check-dev
      - build-and-test
      - terraform-plan-and-apply-dev
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-dev
    if: |
      github.event_name != 'schedule' &&
      !failure() && !cancelled() &&
      (
        needs.detect-changes.outputs.src == 'true' ||
        needs.terraform-state-check-dev.outputs.has_resources != 'true'
      )
    strategy:
      matrix:
        func_app: ${{ fromJSON(needs.terraform-plan-and-apply-dev.outputs.func_apps) }}
    steps:
      - uses: frasermolyneux/actions/deploy-function-app@deploy-function-app/v1.2
        with:
          function-app-artifact-name: "MX.Platform.Status.App"
          function-app-name: ${{ matrix.func_app.name }}
          function-app-resource-group: ${{ matrix.func_app.resource_group_name }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  static-web-app-deploy-dev:
    permissions:
      contents: read
      id-token: write
    environment: Development
    needs:
      - detect-changes
      - terraform-state-check-dev
      - build-and-test
      - terraform-plan-and-apply-dev
      - function-app-deploy-dev
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-dev
    if: |
      github.event_name != 'schedule' &&
      !failure() && !cancelled() &&
      (
        needs.detect-changes.outputs.src == 'true' ||
        needs.terraform-state-check-dev.outputs.has_resources != 'true'
      )
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: static-site
          path: static-site

      - uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - id: static-web-app-api-key
        uses: azure/CLI@v3
        with:
          inlineScript: |
            static_web_app_api_key=$(az staticwebapp secrets list -n ${{ needs.terraform-plan-and-apply-dev.outputs.static_web_app_name }} -o tsv --query properties.apiKey)
            echo "::add-mask::$static_web_app_api_key"
            echo static_web_app_api_key=$static_web_app_api_key >> $GITHUB_ENV

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.static_web_app_api_key }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: static-site
          skip_app_build: true

  terraform-plan-and-apply-prd:
    permissions:
      contents: read
      id-token: write
    environment: Production
    needs:
      - detect-changes
      - terraform-state-check-dev
      - build-and-test
      - terraform-plan-and-apply-dev
      - function-app-deploy-dev
      - static-web-app-deploy-dev
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-prd
    if: |
      !failure() && !cancelled() &&
      (needs.terraform-plan-and-apply-dev.result == 'success' || github.event_name == 'schedule')
    outputs:
      func_apps_prd: ${{ steps.terraform-output.outputs.func_apps_prd }}
      static_web_app_prd: ${{ steps.terraform-output.outputs.static_web_app_prd }}
      static_web_app_name_prd: ${{ steps.terraform-output.outputs.static_web_app_name_prd }}
    steps:
      - if: needs.detect-changes.outputs.terraform == 'true'
        uses: frasermolyneux/actions/terraform-plan-and-apply@terraform-plan-and-apply/v1.4
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/prd.tfvars"
          terraform-backend-file: "backends/prd.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - if: needs.detect-changes.outputs.terraform != 'true'
        uses: frasermolyneux/actions/terraform-output@terraform-output/v1.0
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/prd.tfvars"
          terraform-backend-file: "backends/prd.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - id: terraform-output
        shell: bash
        run: |
          cd terraform
          echo "func_apps_prd=$(terraform output -json func_apps)" >> "$GITHUB_OUTPUT"
          echo "static_web_app_prd=$(terraform output -json static_web_app)" >> "$GITHUB_OUTPUT"
          echo "static_web_app_name_prd=$(terraform output -raw static_web_app_name)" >> "$GITHUB_OUTPUT"
        env:
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_USE_AZUREAD: true
          ARM_USE_OIDC: true

  function-app-deploy-prd:
    permissions:
      contents: read
      id-token: write
    environment: Production
    needs:
      - detect-changes
      - build-and-test
      - terraform-plan-and-apply-prd
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-prd
    if: |
      !failure() && !cancelled() &&
      needs.terraform-plan-and-apply-prd.result == 'success' &&
      needs.detect-changes.outputs.src == 'true'
    strategy:
      matrix:
        func_app: ${{ fromJSON(needs.terraform-plan-and-apply-prd.outputs.func_apps_prd) }}
    steps:
      - uses: frasermolyneux/actions/deploy-function-app@deploy-function-app/v1.2
        with:
          function-app-artifact-name: "MX.Platform.Status.App"
          function-app-name: ${{ matrix.func_app.name }}
          function-app-resource-group: ${{ matrix.func_app.resource_group_name }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  static-web-app-deploy-prd:
    permissions:
      contents: read
      id-token: write
    environment: Production
    needs:
      - detect-changes
      - build-and-test
      - terraform-plan-and-apply-prd
      - function-app-deploy-prd
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-prd
    if: |
      !failure() && !cancelled() &&
      needs.terraform-plan-and-apply-prd.result == 'success' &&
      needs.detect-changes.outputs.src == 'true'
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: static-site
          path: static-site

      - uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - id: static-web-app-api-key
        uses: azure/CLI@v3
        with:
          inlineScript: |
            static_web_app_api_key=$(az staticwebapp secrets list -n ${{ needs.terraform-plan-and-apply-prd.outputs.static_web_app_name_prd }} -o tsv --query properties.apiKey)
            echo "::add-mask::$static_web_app_api_key"
            echo static_web_app_api_key=$static_web_app_api_key >> $GITHUB_ENV

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.static_web_app_api_key }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: static-site
          skip_app_build: true
